    <!-- Función para abrir el popup manualmente -->
    <script>
      window.openGHLPopup = function() {
        // Buscar el contenedor del popup que crea GHL
        const iframe = document.getElementById('popup-uaqsd4f4NziDmIzcwX1Q');
        if (iframe) {
          // El script de GHL envuelve el iframe en un contenedor
          const container = iframe.parentElement;
          if (container) {
            container.style.display = 'block';
            container.style.visibility = 'visible';
            container.style.opacity = '1';
          }
          // También mostrar el iframe directamente
          iframe.style.display = 'block';
          iframe.style.visibility = 'visible';
          iframe.style.opacity = '1';
          iframe.style.position = 'fixed';
          iframe.style.top = '0';
          iframe.style.left = '0';
          iframe.style.width = '100%';
          iframe.style.height = '100%';
          iframe.style.zIndex = '999999';
        }
      };

      // Cerrar popup si se hace click en el overlay
      document.addEventListener('click', function(e) {
        const iframe = document.getElementById('popup-uaqsd4f4NziDmIzcwX1Q');
        if (iframe && e.target === iframe) {
          iframe.style.display = 'none';
          const container = iframe.parentElement;
          if (container && container !== document.body) {
            container.style.display = 'none';
          }
        }
      });
    </script>
